name: Pokemon Drop Notifier

on:
  schedule:
    # The notifier runs in LOOP MODE: each job polls every ~30s for up to
    # ~5h45m, then dispatches its own successor (see "Start next shift").
    # This cron is only a CRASH BACKUP: GitHub throttles scheduled runs
    # brutally (observed: fired every 1-4.5 h despite */15), so it can't be
    # the primary restart mechanism. Extra triggers while a shift is running
    # just wait/replace each other in the concurrency queue (at most one
    # pending).
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # manual start + how a shift launches its successor

# Never let two loops overlap (they'd fight over the shared state). A queued
# run waits until the running shift exits, then takes over seamlessly.
concurrency:
  group: pokemon-drop-notifier
  cancel-in-progress: false

permissions:
  actions: write   # lets a finishing shift dispatch the next one

jobs:
  watch:
    runs-on: ubuntu-latest
    # Give ourselves headroom under GitHub's 6h hard kill so the state cache
    # still gets saved when the loop exits on its own.
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Restore the previous run's state.json. The key includes run_id so every
      # run writes a fresh cache entry; restore-keys grabs the most recent one.
      - name: Restore state
        uses: actions/cache@v5
        with:
          path: state.json
          key: notifier-state-${{ github.run_id }}
          restore-keys: |
            notifier-state-

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run notifier
        env:
          # Telegram (reliable, free). Set both as repo secrets.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          # CallMeBot (WhatsApp). Optional — leave unset if you only use Telegram.
          CALLMEBOT_RECIPIENTS: ${{ secrets.CALLMEBOT_RECIPIENTS }}
          # Optional: override the watched shops without editing notifier.py.
          # Set a repo VARIABLE named SITES to a JSON array (see sites.local.json.example).
          # Leave unset to use the built-in defaults
          # (CardCollectors + WOG.ch + WellPlayed + Laschocards).
          SITES: ${{ vars.SITES }}
          # Loop mode: poll every N seconds inside one long job. Override with a
          # repo VARIABLE named POLL_SECONDS (e.g. 60 to be gentler on the shops).
          POLL_SECONDS: ${{ vars.POLL_SECONDS || 30 }}
          # Exit after ~5h45m so the cache save still happens before GitHub's
          # 6h job kill; the cron starts the next shift.
          MAX_RUNTIME_MINUTES: "345"
        run: python notifier.py

      # Chain the next shift immediately instead of waiting on the throttled
      # cron. workflow_dispatch via GITHUB_TOKEN does start a run (it's an
      # explicit exception to the no-recursive-triggers rule), and the
      # concurrency group makes it wait until this run fully finishes.
      # Only on success — if the job itself is broken, chaining would spin
      # forever; the cron picks up the pieces instead.
      - name: Start next shift
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run watch.yml --repo ${{ github.repository }}
