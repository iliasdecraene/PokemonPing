name: Pokemon Drop Notifier

on:
  schedule:
    # The notifier runs in LOOP MODE: each job polls every ~30s for up to
    # ~5h45m, then exits. This cron doesn't set the polling speed — it only
    # (re)starts the loop. Every 15 min means a crashed job is replaced within
    # ~15 min; while a loop is running, extra triggers just wait/replace each
    # other in the concurrency queue (at most one pending).
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

# Never let two loops overlap (they'd fight over the shared state). A queued
# run waits until the running shift exits, then takes over seamlessly.
concurrency:
  group: pokemon-drop-notifier
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    # Give ourselves headroom under GitHub's 6h hard kill so the state cache
    # still gets saved when the loop exits on its own.
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Restore the previous run's state.json. The key includes run_id so every
      # run writes a fresh cache entry; restore-keys grabs the most recent one.
      - name: Restore state
        uses: actions/cache@v5
        with:
          path: state.json
          key: notifier-state-${{ github.run_id }}
          restore-keys: |
            notifier-state-

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run notifier
        env:
          # Telegram (reliable, free). Set both as repo secrets.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          # CallMeBot (WhatsApp). Optional — leave unset if you only use Telegram.
          CALLMEBOT_RECIPIENTS: ${{ secrets.CALLMEBOT_RECIPIENTS }}
          # Optional: override the watched shops without editing notifier.py.
          # Set a repo VARIABLE named SITES to a JSON array (see sites.local.json.example).
          # Leave unset to use the built-in defaults
          # (CardCollectors + WOG.ch + WellPlayed + Laschocards).
          SITES: ${{ vars.SITES }}
          # Loop mode: poll every N seconds inside one long job. Override with a
          # repo VARIABLE named POLL_SECONDS (e.g. 60 to be gentler on the shops).
          POLL_SECONDS: ${{ vars.POLL_SECONDS || 30 }}
          # Exit after ~5h45m so the cache save still happens before GitHub's
          # 6h job kill; the cron starts the next shift.
          MAX_RUNTIME_MINUTES: "345"
        run: python notifier.py
